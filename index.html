            display: inline-block;

            margin-bottom: 25px;
            text-align: center;

            display: block;

            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        .submit-btn {
            background: var(--secondary);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background: #e67e22;
        }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 11px;
            color: #888;
            background: #fdfdfd;
            border-top: 1px solid #eee;
        }
    </style>
</head>
